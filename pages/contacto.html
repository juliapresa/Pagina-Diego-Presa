<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Por cualquier consulta puedes comunicarte a través del formulario de contacto ingresando tu mensaje o por el mail indicado.">
    <meta name="keywords" content="diego, presa, músico, canciones, cantautor, solista, poeta, guitarrista, compositor, montevideo, uruguay, discos">
    <meta name="google-site-verification" content="touc_B1QkIbplVCPnik2VdcIxgKlWL0kdnWCU6Tx2sQ">
    <title>Contacto | Diego Presa</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://kit.fontawesome.com/eb5d67a816.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="canonical" href="https://www.diegopresa.com/pages/contacto">
</head>

<body>
    <header class="header container-fluid">
        <div data-aos="fade-up" class="row">
            <div class="logo-container col-md-6 col-sm-12 d-flex justify-content-start">
                <a title="logo" href="../index.html"><img src="../assets/img/logoDos.jpg" alt="logo" title="logo"></a>
            </div>
            <div class="col-md-6 col-sm-12 d-flex justify-content-end nav-container">
                <nav class="navbar navbar-expand-lg navbar-light">
                    <div class="container-fluid">
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup"
                            aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                            <div class="navbar-nav">
                                <a title="pages" class="nav-link" href="../index.html">Inicio</a>
                                <a title="pages" class="nav-link" href="./noticias.html">Noticias</a>
                                <a title="pages" class="nav-link" href="./conciertos.html">Conciertos</a>
                                <a title="pages" class="nav-link" href="./musica.html">Música</a>
                                <a title="pages" class="nav-link" href="./videos.html">Videos</a>
                                <a title="pages" class="nav-link" href="./prensa.html">Prensa</a>
                                <a title="pages" class="nav-link active" aria-current="page" href="#">Contacto</a>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="contact">
        <div class="contact__header container">
            <div class="contact__title">
                <h1 data-aos="zoom-in">CONTACTO</h1>
            </div>
            <div class="contact__divider">
                <hr>
            </div>
        </div>
        <div data-aos="fade-up" class="contact__content">
            <div class="contact__image col-md-6 col-sm-12 d-flex justify-content-center">
                <img src="../assets/img/nuevaDos.jpeg" alt="pic" title="pic">
            </div>
            <form id="form" title="formulario" action="https://formsubmit.co/diegopresamusica@gmail.com" method="POST" class="contact__form col-md-6 col-sm-12 d-flex flex-column justify-content-center">
                <div class="contact__field form-floating mb-3">
                    <input autocomplete="name" name="name" type="text" class="form-control" id="name"
                        placeholder="name@example.com" required>
                    <label for="name">Nombre</label>
                </div>
                <div class="contact__field form-floating mb-3">
                    <input name="email" autocomplete="email" type="email" class="form-control" id="email"
                        placeholder="Email" required>
                    <label for="email">Email</label>
                </div>
                <div class="contact__field form-floating mb-3">
                    <textarea name="message" class="form-control" placeholder="Leave a comment here"
                        id="floatingTextarea2" style="height: 100px" required></textarea>
                    <label for="floatingTextarea2">Deja tu mensaje</label>
                </div>
                <div>
                    <button type="submit" class="contact__button btn btn-primary me-2">Enviar</button>
                </div>
            </form>
        </div>
        <div data-aos="fade-up" class="contact__mail">
            <a href="mailto:diegopresamusica@gmail.com">
                diegopresamusica@gmail.com
            </a>
        </div>
    </main>

    <footer class="footer container-fluid">

        <div class="footer__divider">
            <hr>
        </div>

        <div class="footer__social">
            <a href="https://www.instagram.com/diegopresabuceo/" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://twitter.com/diegopresabuceo?lang=es" target="_blank">
                <i class="fa-brands fa-twitter"></i>
            </a>
            <a href="https://www.facebook.com/diegopresabuceo/?locale=es_LA" target="_blank">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://open.spotify.com/artist/3ocrfk5U9Q5V2j6F0T8fjT" target="_blank">
                <i class="fa-brands fa-spotify"></i>
            </a>
            <a href="https://www.youtube.com/c/DiegoPresa" target="_blank">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>

        <div class="footer__copy">
            <p>© 2024. Todos los derechos reservados</p>
        </div>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init({duration: 1000,once: true});</script>
    <script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
